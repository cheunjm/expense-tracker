name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build (turbo)
        run: npx turbo run build --filter=...[origin/main]

      - name: Test (turbo)
        run: npx turbo run test --filter=...[origin/main]
